<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工資料</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Vaani:wght@200;300;400;500;600;700;800&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333333;
            margin: 0;
            padding: 0;
        }
        .error { color: red; }

        .mt-4.mukta-vaani-regular {
            margin-left: auto;
            margin-right: auto;
            /* 設定一個最大寬度，讓置中效果可見 */
            max-width: 350px; /* 您可以根據設計調整這個值 */
            /* 如果需要，也可以設定一個固定的寬度 */
            /* width: 90%; */
        }

        .card-container {
            /* 根據您的佈局 (flexbox, grid 等)，確保它能填滿父容器的可用空間 */
            width: 100%; /* 例如，讓它佔滿 max-width 設定的空間 */
            /* 其他現有的 card-container 樣式 */
            display: flex; /* 假設 card-container 是 flex 容器 */
            /* ... 其他樣式 */
        }
        .error { color: red; }
    </style>
</head>
<body>

<div class="mt-4 mukta-vaani-regular">
    <div class="card-container">
        <div class="sidebar">
            <div class="logo"><img src="https://demo.pulsation.com.tw/ecard/images/logo.png" alt="logo" class="logo-img"></div>
            <button class="cart-btn side_items" onclick="downloadImage()">下載圖檔</button>
            <!--        <button class="cart-btn side_items" onclick="generateQRCode()">QR Code</button>-->
            <button class="cart-btn side_items" onclick="addToContacts()">加入聯絡人</button>
            <button class="cart-btn side_items" onclick="shareLink()">複製連結</button>
        </div>
        <div class="content">
            <div id="qrcode" class="qrcode"></div>
            <img src="https://demo.pulsation.com.tw/ecard/images/default.png" alt="Profile" class="profile-img">
            <div class="info">
                <div class="company">彥星喬商</div>
                <div class="title"><span id="serviceYears"></span></div>
                <div class="name"><h4 class="name"></h4></div>
                <div class="department"><span id="deptName"></span></div>
                <div class="contact">
                    <p><span>📧</span> <a id="email" href=""> </a></p>
                    <p><span>📞</span><span id="mobilePhone1"></span></p>
<!--                    <p><span>📱</span> <span id="mobilePhone2"></span></p>-->
                    <p><span>🏢</span> 台北市信義區東興路51號九樓 </p>
                </div>
            </div>
        </div>
        <div id="errorMessage" class="error mt-3"></div>
    </div>
    <a href="http://demo.pulsation.com.tw/ecard/EmployeeList.html" class="btn btn-secondary mt-3">返回員工列表</a>
</div>


<script>
    // Load html2canvas dynamically
    const html2CanvasScript = document.createElement('script');
    html2CanvasScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    document.body.appendChild(html2CanvasScript);

    // Load QRCode library dynamically
    const qrCodeScript = document.createElement('script');
    qrCodeScript.src = 'https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js';
    document.body.appendChild(qrCodeScript);
    // 新增：從網址路徑獲取員工編號
    function getEmployeeCodeFromPath() {
        const pathSegments = window.location.pathname.split('/');
        // 從路徑的最後一部分開始尋找符合 G<數字> 格式的編號
        for (let i = pathSegments.length - 1; i >= 0; i--) {
            if (/^G[0-9]+$/.test(pathSegments[i])) {
                return pathSegments[i];
            }
        }
        return null; // 如果沒有找到，返回 null
    }
    // Get query parameter
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // 修改：初始化員工資料載入的函式
    function initializeEmployeeData() {
        const code = getEmployeeCodeFromPath();

        if (code) {
            // 此處的 code 已經通過 getEmployeeCodeFromPath 中的正規表達式驗證
            fetchEmployeeData(code); // 使用新的中央函式來獲取資料
        } else {
            $('#errorMessage').text('請在網址路徑中提供有效的員工編號 (例如 /G12345)。');
            // 如果找不到 code，則不執行任何操作或顯示錯誤訊息
            // 確保 QR Code 區域是空的或顯示提示
            const qrcodeContainer = document.getElementById('qrcode');
            if (qrcodeContainer) qrcodeContainer.innerHTML = '';
        }
    }

    // 新增或重構：中央處理獲取員工資料的函式
    function fetchEmployeeData(code) {
        $('#errorMessage').text(''); // 清除之前的錯誤訊息
        // 先嘗試載入 employees.json
        $.ajax({
            url: './employees.json', // 相對路徑
            method: 'GET',
            dataType: 'json',
            success: function(employees) {
                const employee = employees.find(emp => emp.Code === code);
                if (employee) {
                    displayEmployee(employee);
                    showToast('已從 employees.json 載入資料');
                } else {
                    // 未在 employees.json 找到，呼叫 API
                    fetchFromApi(code);
                }
            },
            error: function(xhr) {
                if (xhr.status === 404) {
                    // employees.json 不存在，呼叫 API
                    fetchFromApi(code);
                } else {
                    $('#errorMessage').text('無法載入 employees.json，請檢查檔案是否存在或網路連線。');
                    // 也可以選擇在這裡再次嘗試 API
                    // fetchFromApi(code);
                }
            }
        });
    }

    // 從 API 取得員工資料
    function fetchFromApi(code) {
        $.ajax({
            url: `http://192.168.100.150:3000/api/employee/${code}`,
            method: 'GET',
            success: function(employee) {
                displayEmployee(employee);
                showToast('已從 API 載入資料');
            },
            error: function(xhr) {
                $('#errorMessage').text(xhr.responseJSON?.error || '無法取得員工資料');
            }
        });
    }

    // 顯示員工資料
    function displayEmployee(employee) {
        $('#errorMessage').text('');
        $('.name').text(`${employee.CnName || ''} ${employee.EnName || ''}`.trim());
        $('#serviceYears').text(employee.ServiceYears || '無');
        $('#deptName').text(employee.DeptName || '無');
        $('#email').text(employee.Email || '').attr('href', `mailto:${employee.Email || ''}`);
        $('#mobilePhone1').text(employee.MobilePhone || '');
        $('#mobilePhone2').text(employee.MobilePhone || '');
        generateQRCode(); // Generate QR code after loading data
    }


    // Download image using html2canvas
    function downloadImage() {
        if (typeof html2canvas === 'undefined') {
            console.error('html2canvas 庫未加載！');
            alert('無法下載圖片，請檢查網絡連接並重試。');
            return;
        }

        const container = document.querySelector(".card-container");
        if (!container) {
            console.error('找不到 .card-container 元素！');
            return;
        }

        const sideItems = document.querySelectorAll(".side_items");
        const originalDisplays = [];

        sideItems.forEach(item => {
            originalDisplays.push(item.style.display);
            item.style.display = 'none';
        });

        const options = {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false
        };

        html2canvas(container, options).then(canvas => {
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const fileName = `business_card_${timestamp}.png`;
            link.download = fileName;
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            console.log('圖片已生成並準備下載！');
        }).catch(error => {
            console.error('生成圖片時發生錯誤：', error);
            alert('下載圖片時發生錯誤，請稍後再試。');
        }).finally(() => {
            sideItems.forEach((item, index) => {
                item.style.display = originalDisplays[index] || '';
            });
        });
    }

    // Generate QR code
    function generateQRCode() {
        const currentUrl = window.location.href;
        const qrSize = window.innerWidth <= 480 ? 100 : 120;
        const qrcodeContainer = document.getElementById('qrcode');
        qrcodeContainer.innerHTML = '';

        if (typeof QRCode === 'undefined') {
            qrCodeScript.onload = () => {
                new QRCode(qrcodeContainer, {
                    text: currentUrl,
                    width: qrSize,
                    height: qrSize,
                    colorDark: '#218e26',
                    colorLight: '#ecfbf2'
                });
            };
        } else {
            new QRCode(qrcodeContainer, {
                text: currentUrl,
                width: qrSize,
                height: qrSize,
                colorDark: '#218e26',
                colorLight: '#ecfbf2'
            });
        }
    }

    // Add to contacts
    function addToContacts() {
        const name = $('.name').text().trim();
        const company = $('.company').text().trim();
        const title = $('#serviceYears').text().trim();
        const department = $('#deptName').text().trim();
        const email = $('#email').text().trim();
        const phone = $('#mobilePhone1').text().trim();
        const mobile = $('#mobilePhone2').text().trim();
        const address = '台北市信義區東興路51號九樓';

        const vcard = createVCard(name, company, title, department, email, phone, mobile, address);
        downloadVCard(vcard, name);
    }

    function createVCard(name, company, title, department, email, phone, mobile, address) {
        let firstName = name;
        let lastName = '';
        const nameParts = name.split(' ');
        if (nameParts.length > 1) {
            lastName = nameParts.pop();
            firstName = nameParts.join(' ');
        }

        let vcard = 'BEGIN:VCARD\n';
        vcard += 'VERSION:3.0\n';
        vcard += `N:${lastName};${firstName};;;\n`;
        vcard += `FN:${name}\n`;
        if (company) vcard += `ORG:${company}\n`;
        if (department) vcard += `ORG:${company};${department}\n`;
        if (title) vcard += `TITLE:${title}\n`;
        if (email) vcard += `EMAIL;type=INTERNET;type=WORK:${email}\n`;
        if (phone) vcard += `TEL;type=WORK:${phone}\n`;
        if (mobile) vcard += `TEL;type=CELL:${mobile}\n`;
        if (address) vcard += `ADR;type=WORK:;;${address};;;;\n`;
        vcard += `URL:${window.location.href}\n`;
        vcard += `REV:${new Date().toISOString()}\n`;
        vcard += 'END:VCARD';
        return vcard;
    }

    function downloadVCard(vcard, name) {
        const blob = new Blob([vcard], {type: 'text/vcard;charset=utf-8'});
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${name.replace(/\s+/g, '_')}.vcf`;
        document.body.appendChild(link);
        link.click();
        setTimeout(() => {
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }, 100);
    }

    // Share or copy link
    function shareLink() {
        const currentUrl = window.location.href;
        if (navigator.share) {
            navigator.share({
                title: document.title,
                url: currentUrl
            }).then(() => {
                console.log('分享成功！');
            }).catch(error => {
                console.error('分享失敗:', error);
                copyToClipboard(currentUrl);
            });
        } else {
            copyToClipboard(currentUrl);
        }
    }

    function copyToClipboard(text) {
        const tempInput = document.createElement('input');
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();

        try {
            const success = document.execCommand('copy');
            showToast(success ? '連結已複製到剪貼板' : '複製失敗，請手動複製');
        } catch (err) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast('連結已複製到剪貼板'))
                    .catch(err => {
                        showToast('複製失敗，請手動複製');
                        console.error('複製失敗:', err);
                    });
            } else {
                showToast('您的瀏覽器不支持自動複製');
                console.error('複製失敗:', err);
            }
        } finally {
            document.body.removeChild(tempInput);
        }
    }

    function showToast(message) {
        let toast = document.getElementById('toast-message');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 300);
        }, 2000);
    }

    // Load employee details and QR code on page load
    $(document).ready(function () {
        initializeEmployeeData(); // <--- 新的呼叫
        window.addEventListener('resize', generateQRCode); // generateQRCode 應該在 displayEmployee 之後或有資料時才有效
    });
</script>
</body>
</html>
