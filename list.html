<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工列表</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .error { color: red; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h2>員工列表</h2>
  <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
  <div class="table-responsive">
    <table class="table table-striped">
      <thead>
      <tr>
        <th>工號</th>
        <th>姓名</th>
        <th>服務年資</th>
        <th>部門</th>
        <th>操作</th>
      </tr>
      </thead>
      <tbody id="employeeList"></tbody>
    </table>
  </div>
  <a href="/" class="btn btn-secondary">返回</a>
</div>

<script>
  // Fetch and display employee list
  function loadEmployeeList() {
    $.ajax({
      url: 'http://localhost:3000/api/employees',
      method: 'GET',
      success: function(data) {
        const tbody = $('#employeeList');
        tbody.empty();
        data.forEach(employee => {
          tbody.append(`
              <tr>
                <td>${employee.Code}</td>
                <td>${employee.CnName || ''}</td>
                <td>${employee.ServiceYears || '無'}</td>
                <td>${employee.DeptName || '無'}</td>
                <td>
                  <a href="Index.html?code=${employee.Code}" class="btn btn-primary btn-sm">查看名片</a>
                </td>
              </tr>
            `);
        });
      },
      error: function(xhr) {
        $('#errorMessage').show().text(xhr.responseJSON?.error || '無法取得員工列表');
      }
    });
  }

  // Load employee list on page load
  $(document).ready(function() {
    loadEmployeeList();
  });
</script>
</body>
</html>
